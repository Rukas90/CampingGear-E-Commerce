name: Weekly Restock Trigger
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke
        run: |
          curl -f -X POST "${{ secrets.API_URL }}/api/v1/inventory/restock" -H "X-Api-Key: ${{ secrets.RESTOCK_API_KEY }}"