name: Migrate Database

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'server/**/Migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            server

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore dependencies
        working-directory: ./server
        run: dotnet restore

      - name: Install EF tools
        run: dotnet tool install --global dotnet-ef

      - name: Run migrations
        shell: pwsh
        working-directory: ./server
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.NEON_CONNECTION_STRING }}
        run: ./migrate.ps1 -command update -env prod
